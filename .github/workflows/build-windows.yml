name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Build app
        run: pyinstaller packaging/markitdown-desktop.spec --noconfirm --clean

      - name: Copy notices
        run: |
          Copy-Item README.md "dist/MarkItDown Desktop/README.md"
          Copy-Item LICENSE "dist/MarkItDown Desktop/LICENSE"
          Copy-Item THIRD_PARTY_NOTICES.md "dist/MarkItDown Desktop/THIRD_PARTY_NOTICES.md"

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/MarkItDown Desktop" -DestinationPath "MarkItDown-Desktop-Windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkItDown-Desktop-Windows
          path: "dist/MarkItDown Desktop"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MarkItDown-Desktop-Windows.zip
